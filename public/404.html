<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Wiqaiah</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script will detect if the app is in a subfolder (repo name) or root
      var l = window.location;
      var pathSegmentsToKeep = 0;
      
      // If we are on github.io and have a path, the first segment is the repo name
      if (l.hostname.indexOf('github.io') !== -1) {
        var segments = l.pathname.split('/');
        if (segments.length > 1 && segments[1] !== "") {
          pathSegmentsToKeep = 1;
        }
      }

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
